<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYORA SILVER</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <img src="assets/logo.svg" alt="VAYORA Logo">
                <h1>VAYORA SILVER</h1>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Slides will be generated dynamically -->
        <div class="carousel-dots"></div>
    </section>

    <!-- Collections Panel -->
    <section class="collections">
        <h2 class="collections-title">Our Exclusive Collections</h2>
        <div class="collections-wrapper">
            <!-- Items dynamically loaded from JSON -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-container">
            <!-- Left -->
            <div class="footer-left">
                <div class="footer-logo">
                    <img src="assets/logo.svg" alt="VAYORA Logo">
                    <h2>VAYORA SILVER</h2>
                </div>
                <p class="contact-email">Email: info@vayorasilver.com</p>
                <div class="social-icons">
                    <a href="#"><img src="assets/facebook.svg" alt="Facebook"></a>
                    <a href="#"><img src="assets/instagram.svg" alt="Instagram"></a>
                    <a href="#"><img src="assets/whatsapp.svg" alt="Whatsapp"></a>
                </div>
            </div>

            <!-- Right -->
            <div class="footer-right">
                <h3>Quick Links</h3>
                <ul class="footer-nav">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 VAYORA SILVER. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="js/script.js"></script>
</body>
</html>
